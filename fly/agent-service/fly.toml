# CortexFlow - Python Agent Service
app = "cortexflow-agent"
primary_region = "iad"

[build]
  dockerfile = "fly/agent-service/Dockerfile"

[env]
  AGENT_SERVICE_PORT = "8090"
  OLLAMA_URL = "http://cortexflow-ollama.internal:11434"

[http_service]
  internal_port = 8090
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2
