# CortexFlow - Ollama AI Server
app = "cortexflow-ollama"
primary_region = "iad"

[build]
  dockerfile = "fly/ollama/Dockerfile"

[env]
  OLLAMA_HOST = "0.0.0.0"

[http_service]
  internal_port = 11434
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 4

[mounts]
  source = "cortexflow_ollama_models"
  destination = "/root/.ollama"
